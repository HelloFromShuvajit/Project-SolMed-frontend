<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="../CommonCss/Common.css">
    <link rel="stylesheet" href="UserProfile.css">
</head>
<body>
    <header>
        <h2>Sol-med</h2>
    </header>
    <div class="content">
        <div class="sidebar">
            <ul>
                <li><a href="../AddMedicine/AddMedicine.html">Add a Medicine</a></li>
                <li><a href="../MedicineLog/Medicine.html">My Medicines</a></li>
                <li> <span onclick="logout()">Logout</span></li>
            </ul>
        </div>
        <main>
            <div>
                <div class="userInfo">
                    <h3><span id="userName"></span></h3>
                    <p><span id="id"></span></p>
                </div>
                <div class="details">
                    <div>
                        <div class="info">
                            <p>Email: </p>
                        </div>
                        <div>        
                            <p id="email"></p>
                        </div>
                    </div>
                    <div>
                        <div class="info">
                            <p>Age: </p>
                        </div>
                        <div>
                            <p id="age"></p>
                        </div>
                    </div>
                    <div>
                        <div class="info">
                            <p>Phone No: </p>
                        </div>
                        <div>
                            <p id="phoneno"></p>
                        </div>
                    </div>
                    <div>
                        <div class="info">
                            <p>Gender: </p>
                        </div>
                        <div>
                            <p id="gender"></p>
                        </div>
                    </div>
                    
                <section class="caretaker-requests-section" aria-labelledby="caretakerReqHeading">
                    <h2 id="caretakerReqHeading" class="page-heading">Caretaker link requests</h2>
                    <p class="subtle">When someone asks to monitor your medicines, approve or reject here.</p>
                    <div id="caretakerRequestsList" class="caretaker-requests-list"></div>
                </section>
                <section class="caretaker-linked-section" aria-labelledby="caretakerLinkedHeading">
                    <h2 id="caretakerLinkedHeading" class="page-heading">Linked caretakers</h2>
                    <p class="subtle">People currently approved to view your medicine adherence.</p>
                    <ul id="caretakerList" class="caretaker-linked-list"></ul>
                    <p id="caretakerInviteMsg" class="subtle"></p>
                </section>
            </div>
        </main>
    </div>
    <script src="../Common.js"></script>
    <script src="UserProfile.js"></script>
</body>
</html>
